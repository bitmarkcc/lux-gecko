<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
html { font-size: 18px; }
body {
  max-width: 600px;
  margin: 1rem auto;
  padding: 1rem;
  background: #1E1E2E;
  color: #CDD6F4;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 1rem;
}
h2 { color: #89B4FA; margin-top: 0; font-size: 1.4rem; }
label { display: block; margin-bottom: 0.3rem; color: #A6ADC8; font-size: 0.95rem; }
input[type="text"] {
  width: 100%;
  padding: 0.5rem;
  border: 1px solid #4A4952;
  border-radius: 4px;
  background: #313244;
  color: #CDD6F4;
  font-size: 0.95rem;
  box-sizing: border-box;
}
.btn {
  display: inline-block;
  padding: 0.5rem 1.2rem;
  border: 1px solid #4A4952;
  border-radius: 4px;
  background: #313244;
  color: #CDD6F4;
  cursor: pointer;
  font-size: 0.95rem;
  margin-top: 0.6rem;
}
.btn:hover { background: #45475A; }
.saved { color: #A6E3A1; margin-left: 0.5rem; display: none; }
h3 { color: #A6ADC8; margin-top: 1.5rem; font-size: 1.15rem; }
.trusted-list { margin-top: 0.5rem; }
.trusted-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.4rem 0.5rem;
  background: #181825;
  border-radius: 4px;
  margin-bottom: 0.3rem;
  font-size: 0.8rem;
  font-family: monospace;
}
.remove-btn {
  background: none;
  border: 1px solid #C62828;
  color: #C62828;
  border-radius: 3px;
  padding: 0.2rem 0.5rem;
  cursor: pointer;
  font-size: 0.75rem;
}
.remove-btn:hover { background: #3a1a1a; }
</style>
</head>
<body>
<h2>Certimark Settings</h2>

<label for="api-url">API Server URL</label>
<input type="text" id="api-url" placeholder="https://certimark.cc">

<label for="api-pubkey-hash" style="margin-top:12px;">API Server Pubkey Hash (SHA-256, hex)</label>
<input type="text" id="api-pubkey-hash" placeholder="512d578c6ea650c92361c8e20c8acaa1b3e9bf062a2aea839343d709b0ea3cf7">
<div style="color:#A6ADC8;font-size:0.75rem;margin-top:0.2rem;">Leave empty to disable certificate pinning for the API server.</div>

<label for="mark-url" style="margin-top:12px;">Marking Server URL</label>
<input type="text" id="mark-url" placeholder="https://xmark.cc">

<label for="mark-pubkey-hash" style="margin-top:12px;">Marking Server Pubkey Hash (SHA-256, hex)</label>
<input type="text" id="mark-pubkey-hash" placeholder="a924a21bdecec29dff228fb13d36394f010c399d39bd9abd17a0ca7c349ce96d">
<div style="color:#A6ADC8;font-size:0.75rem;margin-top:0.2rem;">Used by the "mark" button, and to pin the marking server's certificate.</div>

<div>
  <button class="btn" id="save-btn">Save</button>
  <span class="saved" id="saved-msg">Saved!</span>
</div>

<h3>Trusted Certificates</h3>
<div class="trusted-list" id="trusted-list"></div>

<h3>Trusted Signing Keys</h3>
<div class="trusted-list" id="signer-list"></div>

<script src="options.js"></script>
</body>
</html>
