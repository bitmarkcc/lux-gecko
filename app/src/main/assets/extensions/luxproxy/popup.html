<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg: #1E1E2E;
      --surface: #313244;
      --border: #45475A;
      --text: #CDD6F4;
      --muted: #A6ADC8;
      --accent: #89B4FA;
      --green: #A6E3A1;
    }
    * { box-sizing: border-box; }
    body {
      width: 92vw;
      max-width: 380px;
      margin: 0;
      padding: 26px 22px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-align: center;
    }
    h1 { font-size: 30px; margin: 0 0 28px; font-weight: 600; }

    .toggle-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px;
    }
    .switch { position: relative; display: inline-block; width: 124px; height: 64px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      cursor: pointer;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 64px;
      transition: background .2s;
    }
    .slider::before {
      content: "";
      position: absolute;
      height: 50px;
      width: 50px;
      left: 6px;
      top: 6px;
      background: #fff;
      border-radius: 50%;
      transition: transform .2s;
    }
    .switch input:checked + .slider { background: var(--green); border-color: var(--green); }
    .switch input:checked + .slider::before { transform: translateX(60px); }
    .toggle-state { font-size: 24px; font-weight: 600; color: var(--muted); }

    .field-label {
      display: block;
      font-size: 22px;
      color: var(--muted);
      margin: 20px 0 8px;
    }
    input[type="text"], input[type="number"] {
      width: 100%;
      padding: 14px;
      font-size: 26px;
      text-align: center;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
    }
    input[type="text"]:focus, input[type="number"]:focus {
      outline: none;
      border-color: var(--accent);
    }
    #status { margin-top: 24px; font-size: 22px; color: var(--green); min-height: 26px; }
  </style>
</head>
<body>
  <h1>Proxy Settings</h1>

  <div class="toggle-row">
    <label class="switch">
      <input type="checkbox" id="enabled">
      <span class="slider"></span>
    </label>
    <span class="toggle-state" id="toggle-state">Off</span>
  </div>

  <label class="field-label" for="host">Host</label>
  <input type="text" id="host" placeholder="127.0.0.1">

  <label class="field-label" for="port">Port</label>
  <input type="number" id="port" placeholder="9050">

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
