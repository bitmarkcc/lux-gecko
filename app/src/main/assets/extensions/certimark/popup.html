<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
html { font-size: 36px; }
body {
  width: 95vw;
  max-width: 22rem;
  min-height: 5rem;
  margin: 0;
  padding: 1rem;
  /* Extra scroll room so the description textarea can scroll above the
     on-screen keyboard when focused (see scrollIntoView in popup.js). */
  padding-bottom: 50vh;
  background: #1E1E2E;
  color: #CDD6F4;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 1rem;
}
.domain {
  font-size: 1.2rem;
  font-weight: bold;
  color: #89B4FA;
  margin-bottom: 0.2rem;
  word-break: break-all;
}
.description {
  color: #A6ADC8;
  font-size: 0.9rem;
  margin-bottom: 0.7rem;
}
.status {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.6rem 0.7rem;
  border-radius: 6px;
  margin-bottom: 0.7rem;
}
.status.green { background: #1a3a1a; border: 1px solid #2E7D32; }
.status.yellow { background: #3a3a1a; border: 1px solid #F9A825; }
.status.red { background: #3a1a1a; border: 1px solid #C62828; }
.status.grey { background: #2a2a3a; border: 1px solid #555; }
.status-icon { font-size: 1.3rem; }
.status-text { flex: 1; }
.cert-info {
  background: #181825;
  border-radius: 4px;
  padding: 0.6rem;
  margin-bottom: 0.6rem;
  font-size: 0.9rem;
}
.cert-info .label { color: #A6ADC8; }
.cert-info .value { color: #CDD6F4; font-family: monospace; word-break: break-all; }
.cert-weight { color: #F9E2AF; }
.btn {
  display: inline-block;
  padding: 0.5rem 1rem;
  border: 1px solid #4A4952;
  border-radius: 4px;
  background: #313244;
  color: #CDD6F4;
  cursor: pointer;
  font-size: 0.9rem;
  text-decoration: none;
}
.btn:hover { background: #45475A; }
.btn-trust { border-color: #F9A825; color: #F9A825; }
a { color: #89B4FA; text-decoration: none; }
a:hover { text-decoration: underline; }
#loading { color: #A6ADC8; }
.mark-row { margin-top: 0.9rem; border-top: 1px solid #313244; padding-top: 0.8rem; }
.mark-desc { display: block; width: 100%; box-sizing: border-box; margin-bottom: 0.6rem; padding: 0.5rem; font-size: 0.9rem; font-family: inherit; background: #181825; color: #CDD6F4; border: 1px solid #4A4952; border-radius: 4px; resize: vertical; }
.mark-desc:focus { outline: none; border-color: #89B4FA; }
.mark-action { display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem; }
.mark-btn { flex: 0 0 auto; display: inline-flex; align-items: center; gap: 0.45rem; padding: 0.5rem 0.9rem; background: #313244; color: #CDD6F4; border: 1px solid #4A4952; border-radius: 4px; cursor: pointer; font-size: 1rem; }
.mark-btn:hover { background: #45475A; }
.mark-btn:disabled { opacity: 0.6; cursor: default; }
.mark-btn img { width: 1.4rem; height: 1.4rem; }
#mark-result { flex: 1 1 auto; min-width: 0; font-size: 0.9rem; word-break: break-word; }
#mark-result.mark-ok { color: #A6E3A1; }
#mark-result.mark-err { color: #F38BA8; }
.copy-btn { background: none; border: none; color: #89B4FA; cursor: pointer; padding: 0 0.2rem; font-size: inherit; line-height: 1; vertical-align: middle; }
.copy-btn:hover { color: #B4BEFE; }
.copy-btn.copied { color: #A6E3A1; }
</style>
</head>
<body>
<div id="loading">Loading...</div>
<div id="content" style="display:none">
  <div class="domain" id="domain"></div>
  <div id="status-box"></div>
  <div id="cert-details"></div>
  <div id="actions"></div>
  <div class="mark-row">
    <textarea id="mark-desc" class="mark-desc" maxlength="92" rows="3" placeholder="description to mark…"></textarea>
    <div class="mark-action">
      <button class="mark-btn" id="mark-btn"><img src="icons/bitmark128.png" alt="">mark</button>
      <div id="mark-result"></div>
    </div>
  </div>
</div>
<script src="popup.js"></script>
</body>
</html>
